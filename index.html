<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sports Day Event</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>🏁 Sports Day Event</h1>

  <div class="container">

    <div class="event opening">Opening Ceremony</div>
    <div class="event race">100M Race</div>
    <div class="event longjump">Long Jump</div>
    <div class="event highjump">High Jump</div>
    <div class="event award">Award Ceremony</div>

    <div class="scoreboard">
      <h2>Score Board</h2>
      <table>
        <tr>
          <th>Team</th>
          <th>Points</th>
        </tr>
        <tr>
          <td>Red</td>
          <td>0</td>
        </tr>
        <tr>
          <td>Blue</td>
          <td>0</td>
        </tr>
        <tr>
          <td>Green</td>
          <td>0</td>
        </tr>
        <tr>
          <td>Yellow</td>
          <td>0</td>
        </tr>
      </table>
    </div>

    <button class="btn">Start Event</button>

  </div>

</body>
</html>
